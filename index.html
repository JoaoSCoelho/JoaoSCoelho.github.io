<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting</title>
    <style>
        #btn {
            position: absolute;
            text-transform: uppercase;
            background-color: #007bff;
            text-decoration: none;
            color: white;
            font-family: sans-serif;
            box-shadow: 0px 9px 20px rgb(0, 0, 0, .1);
            border-radius: 100px;
            padding: 24px 40px;
            font-weight: bold;
            font-size: 2rem;
            top: 50dvh;
            transform: translate(-50%, -50%);
            margin: auto;
            display: block;
            width: fit-content;
            transition: 150ms;
            left: 50%;
        }

        #btn:hover {
            background-color: #0064d0;
            top: calc(50dvh - 10px);
        }
    </style>
</head>

<body>
    <a href="https://www.joaoscoelho.com" id="btn">Redirect
        to</a>
    <script>
        window.location.assign("https://www.joaoscoelho.com")
    </script>
</body>

</html>
